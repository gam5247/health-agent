name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install .

      - name: Compile Python sources
        run: python -m compileall -q src scripts tests

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run deterministic smoke checks
        run: |
          python scripts/run_demo.py --limit 1 > /dev/null
          python scripts/run_llm_eval.py --dry-run --max-patients 1 --top-k 1 > /dev/null
          python scripts/validate_submission_artifact.py

      - name: Run installed console scripts
        run: |
          health-agent-demo --patients data/raw/oncology-synthetic-patients.json --trials data/raw/sample-trials.json --limit 1 > /dev/null
          health-agent-llm-eval --dry-run --max-patients 1 --top-k 1 --output outputs/ci-llm-smoke.json > /dev/null

      - name: Verify answer-key-free agent workspace
        run: |
          python scripts/build_agent_eval_workspace.py --force --max-patients 2
          python scripts/assert_agent_workspace_clean.py artifacts/e2e-orchestration-agent-workspace
